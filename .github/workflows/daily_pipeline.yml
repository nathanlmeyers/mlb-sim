name: MLB Daily Pipeline

on:
  schedule:
    - cron: '0 12 * * *'   # 8am ET — settle yesterday
    - cron: '0 14 * * *'   # 10am ET — D1: games 11am-2pm ET
    - cron: '0 17 * * *'   # 1pm ET  — D2: games 2pm-5pm ET
    - cron: '0 20 * * *'   # 4pm ET  — D3: games 5pm-8pm ET
    - cron: '0 23 * * *'   # 7pm ET  — D4: games 8pm-11pm ET
  workflow_dispatch:
    inputs:
      mode:
        description: 'Manual run mode'
        type: choice
        options: [settle, dispatch-now, full-day]
        default: dispatch-now

env:
  PY_DEPS: "numpy pandas MLB-StatsAPI sqlalchemy psycopg2-binary click"

jobs:
  # ---------- Morning settlement ----------
  settle:
    if: >-
      (github.event_name == 'schedule' && github.event.schedule == '0 12 * * *') ||
      (github.event_name == 'workflow_dispatch' && (inputs.mode == 'settle' || inputs.mode == 'full-day'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install $PY_DEPS
      - uses: actions/cache@v4
        with:
          path: .context/season_2025.json
          key: season-2025-v1
      - name: Settle yesterday
        run: |
          YESTERDAY=$(python -c "from datetime import date,timedelta;print((date.today()-timedelta(days=1)).isoformat())")
          echo "=== Morning settle for yesterday ($YESTERDAY) ==="
          python scripts/fetch_daily.py $YESTERDAY
          python scripts/paper_trade.py settle $YESTERDAY || echo "(no open bets or games not final)"
          python scripts/paper_trade.py report
      - name: Commit
        run: |
          git config user.name mlb-sim-bot
          git config user.email actions@users.noreply.github.com
          git add -A .context/
          git diff --cached --quiet || (git commit -m "auto: settle yesterday" && git push)

  # ---------- Dispatcher: emit matrix of games ----------
  dispatch:
    if: >-
      (github.event_name == 'schedule' && github.event.schedule != '0 12 * * *') ||
      (github.event_name == 'workflow_dispatch' && inputs.mode != 'settle')
    runs-on: ubuntu-latest
    outputs:
      games: ${{ steps.list.outputs.games }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install MLB-StatsAPI
      - id: list
        env:
          GITHUB_SCHEDULE: ${{ github.event.schedule }}
        run: python scripts/list_games_for_dispatch.py

  # ---------- Per-game matrix: sleep until T-60min, then run ----------
  per_game:
    needs: dispatch
    if: needs.dispatch.outputs.games != '[]' && needs.dispatch.outputs.games != ''
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        game: ${{ fromJson(needs.dispatch.outputs.games) }}
      max-parallel: 6
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - run: pip install $PY_DEPS
      - uses: actions/cache@v4
        with:
          path: .context/season_2025.json
          key: season-2025-v1
      - name: Sleep until T-60min
        run: |
          TRIGGER=${{ matrix.game.trigger_ts }}
          NOW=$(date -u +%s)
          echo "Game: ${{ matrix.game.title }}"
          echo "First pitch: ${{ matrix.game.first_pitch }}"
          echo "Trigger at:  $(date -u -d @$TRIGGER '+%FT%TZ' 2>/dev/null || date -u -r $TRIGGER '+%FT%TZ')"
          echo "Current:     $(date -u '+%FT%TZ')"
          echo "Sleeping $((TRIGGER - NOW)) seconds..."
          while [ "$(date -u +%s)" -lt "$TRIGGER" ]; do sleep 30; done
          echo "Woken at $(date -u '+%FT%TZ')"
      - name: Run pipeline for this game
        run: |
          echo "=== Running pipeline for game ${{ matrix.game.id }} (${{ matrix.game.title }}) ==="
          python scripts/daily_pipeline.py --game-id ${{ matrix.game.id }}
      - name: Log paper bet
        run: |
          TODAY=$(python -c "from datetime import date; print(date.today().isoformat())")
          python scripts/paper_trade.py log $TODAY
          python scripts/paper_trade.py report
      - name: Commit with rebase-on-conflict
        run: |
          git config user.name mlb-sim-bot
          git config user.email actions@users.noreply.github.com
          for i in 1 2 3 4 5; do
            git fetch origin main
            git pull --rebase origin main || git rebase --abort
            git add -A .context/
            if git diff --cached --quiet; then
              echo "No changes to commit"
              exit 0
            fi
            if git commit -m "auto: game ${{ matrix.game.id }} — ${{ matrix.game.title }}" 2>/dev/null; then
              if git push 2>&1; then
                echo "Pushed successfully on attempt $i"
                exit 0
              fi
              # push failed — reset and retry
              git reset --soft HEAD~1 2>/dev/null || true
            fi
            echo "Attempt $i failed, retrying..."
            sleep $((RANDOM % 30 + 5))
          done
          echo "Failed after 5 attempts"
          exit 1
